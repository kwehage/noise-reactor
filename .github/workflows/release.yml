name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  # ── Linux → AppImage ─────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            meson ninja-build \
            qt6-base-dev qt6-base-private-dev \
            qt6-tools-dev qt6-tools-dev-tools \
            qt6-multimedia-dev \
            qt6-shader-baker \
            libvulkan-dev \
            libsndfile1-dev \
            libfftw3-dev
          echo "/usr/lib/qt6/bin" >> $GITHUB_PATH

      - name: Build
        run: |
          meson setup build --prefix /usr
          meson compile -C build

      - name: Stage install
        run: DESTDIR=$PWD/AppDir meson install -C build

      - name: Package AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: |
          # Icon
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          cp doc/noise_reactor.png AppDir/usr/share/icons/hicolor/256x256/apps/noise-reactor.png

          # Desktop file
          mkdir -p AppDir/usr/share/applications
          cp linux/noise-reactor.desktop AppDir/usr/share/applications/

          # Download linuxdeploy + Qt plugin (both must be in the same directory
          # so linuxdeploy can discover the plugin by name)
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-qt-x86_64.AppImage

          export QMAKE=/usr/lib/qt6/bin/qmake6

          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --plugin qt \
            --output appimage

          mv Noise_Reactor*.AppImage noise-reactor-${{ github.ref_name }}-linux-x86_64.AppImage

      - uses: softprops/action-gh-release@v2
        with:
          files: noise-reactor-*.AppImage

  # ── Windows → zip ────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          pacboy: >-
            qt6-base:p
            qt6-multimedia:p
            qt6-tools:p
            qt6-shadertools:p
            libsndfile:p
            fftw:p
            meson:p
            ninja:p
            pkgconf:p
            vulkan-headers:p
            vulkan-loader:p

      - name: Build
        run: |
          meson setup build
          meson compile -C build

      - name: Package
        run: |
          DIST=noise-reactor-${{ github.ref_name }}-windows-x86_64
          mkdir -p $DIST

          cp build/noise_reactor.exe $DIST/

          # Qt DLLs and platform plugins
          windeployqt6 $DIST/noise_reactor.exe

          # MinGW runtime and third-party DLLs (libsndfile, fftw, libstdc++, etc.)
          ldd build/noise_reactor.exe \
            | grep '/mingw64/' \
            | awk '{ print $3 }' \
            | xargs -I{} cp {} $DIST/

          7z a ${DIST}.zip $DIST/

      - uses: softprops/action-gh-release@v2
        with:
          files: noise-reactor-*.zip
