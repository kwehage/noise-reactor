name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  # ── Linux → AppImage ─────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.8.*'
          host: 'linux'
          target: 'desktop'
          arch: 'linux_gcc_64'
          modules: 'qtmultimedia qtshadertools'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            meson ninja-build \
            libvulkan-dev \
            libsndfile1-dev \
            libfftw3-dev
          echo "CMAKE_PREFIX_PATH=$QT_ROOT_DIR" >> $GITHUB_ENV

      - name: Build
        run: |
          meson setup build --prefix /usr
          meson compile -C build

      - name: Stage install
        run: DESTDIR=$PWD/AppDir meson install -C build

      - name: Package AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: |
          # Icon
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          cp doc/noise_reactor.png AppDir/usr/share/icons/hicolor/256x256/apps/noise-reactor.png

          # Desktop file
          mkdir -p AppDir/usr/share/applications
          cp linux/noise-reactor.desktop AppDir/usr/share/applications/

          # Download linuxdeploy + Qt plugin (both must be in the same directory
          # so linuxdeploy can discover the plugin by name)
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-qt-x86_64.AppImage

          export QMAKE=$(which qmake)

          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --plugin qt \
            --output appimage

          mv Noise_Reactor*.AppImage noise-reactor-${{ github.ref_name }}-linux-x86_64.AppImage

      - uses: softprops/action-gh-release@v2
        with:
          files: noise-reactor-*.AppImage

  # ── Windows → zip ────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          pacboy: >-
            gcc:p
            qt6-base:p
            qt6-multimedia:p
            qt6-tools:p
            qt6-shadertools:p
            libsndfile:p
            fftw:p
            meson:p
            ninja:p
            pkgconf:p
            vulkan-headers:p
            vulkan-loader:p

      - name: Add Qt host tools to PATH
        run: |
          for var in host_bins bindir libexecdir host_libexecs; do
            d=$(pkg-config --variable=$var Qt6Core 2>/dev/null)
            if [ -n "$d" ]; then
              cygpath -w "$d" >> $GITHUB_PATH
            fi
          done

      - name: Build
        run: |
          CC=gcc CXX=g++ meson setup build
          meson compile -C build

      - name: Package
        run: |
          DIST=noise-reactor-${{ github.ref_name }}-windows-x86_64
          mkdir -p $DIST

          cp build/noise_reactor.exe $DIST/

          # Qt DLLs and platform plugins
          windeployqt6 $DIST/noise_reactor.exe

          # MinGW runtime and third-party DLLs (libsndfile, fftw, libstdc++, etc.)
          ldd build/noise_reactor.exe \
            | grep '/mingw64/' \
            | awk '{ print $3 }' \
            | xargs -I{} cp {} $DIST/

          7z a ${DIST}.zip $DIST/

      - uses: softprops/action-gh-release@v2
        with:
          files: noise-reactor-*.zip
